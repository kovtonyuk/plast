name: plast_app
description: "Пласт - Ukrainian Scout Organization Mobile App"
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  equatable: ^2.0.5
  supabase_flutter: ^2.3.0
  table_calendar: ^3.0.9
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  web: ^1.1.0
  webview_flutter: ^4.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  dart_bump: ^1.0.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
